<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0d1f3c">
<title>Trabajos H2B</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0d1f3c;--navy2:#162d52;--blue:#2563eb;--blue-light:#dbeafe;
  --green:#059669;--green-light:#d1fae5;--amber:#d97706;--amber-light:#fef3c7;
  --gray1:#f8fafc;--gray2:#e2e8f0;--gray3:#94a3b8;--gray4:#64748b;
  --dark:#0f172a;--white:#fff;--radius:12px;
  --shadow:0 1px 8px rgba(15,23,42,.08),0 4px 16px rgba(15,23,42,.06);
}
body{font-family:'Inter',sans-serif;background:var(--gray1);color:var(--dark);min-height:100vh;-webkit-font-smoothing:antialiased}

/* HEADER */
header{background:var(--navy);position:sticky;top:0;z-index:100;box-shadow:0 2px 20px rgba(0,0,0,.3)}
.header-inner{padding:14px 16px 0}
.header-top{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.logo-mark{width:34px;height:34px;background:var(--blue);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.app-title{font-family:'Syne',sans-serif;font-size:1.2rem;color:var(--white);letter-spacing:-.3px}
.app-sub{font-size:.7rem;color:#7fa8d4;margin-top:1px}

/* SEARCH ROW */
.search-row{display:flex;align-items:center;gap:8px;margin-bottom:0}
.search-wrap{position:relative;flex:1}
.search-wrap input{width:100%;padding:10px 16px 10px 38px;border:none;background:rgba(255,255,255,.12);color:white;font-size:.88rem;outline:none;font-family:'Inter',sans-serif;border-radius:9px}
.search-wrap input::placeholder{color:#7fa8d4}
.search-wrap .si{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#7fa8d4;font-size:14px;pointer-events:none}
.btn-avanzada{flex-shrink:0;background:var(--blue);border:none;color:white;padding:9px 12px;border-radius:9px;font-size:.75rem;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;white-space:nowrap;display:none;align-items:center;gap:4px;transition:background .15s}
.btn-avanzada.visible{display:flex}
.btn-avanzada.active{background:#1d4ed8}

/* TABS */
.tabs{display:flex;background:var(--navy2);border-top:1px solid rgba(255,255,255,.08);margin-top:10px}
.tab{flex:1;padding:11px 8px;text-align:center;font-size:.82rem;font-weight:600;color:#7fa8d4;cursor:pointer;border:none;background:none;font-family:'Inter',sans-serif;transition:all .15s;position:relative}
.tab.active{color:var(--white)}
.tab.active::after{content:'';position:absolute;bottom:0;left:20%;right:20%;height:2px;background:var(--blue);border-radius:2px 2px 0 0}
.tab-count{display:inline-flex;align-items:center;justify-content:center;background:var(--blue);color:white;font-size:.65rem;font-weight:700;padding:1px 6px;border-radius:10px;margin-left:5px;min-width:18px}
.tab-count.empty{background:var(--gray3)}

/* FILTER PANEL */
.filter-panel{background:var(--white);border-bottom:2px solid var(--gray2);overflow:hidden;max-height:0;transition:max-height .35s ease}
.filter-panel.open{max-height:700px}
.filter-inner{padding:16px}
.filter-section{margin-bottom:18px}
.filter-section:last-child{margin-bottom:0}
.filter-label{font-size:.72rem;font-weight:700;color:var(--gray4);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.filter-label span{background:var(--blue-light);color:var(--blue);font-size:.65rem;padding:2px 7px;border-radius:10px;font-weight:600}

/* CHECKBOX GRID */
.check-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.check-item{display:flex;align-items:center;gap:6px;padding:6px 8px;border-radius:8px;border:1.5px solid var(--gray2);cursor:pointer;transition:all .15s;background:var(--white)}
.check-item:hover{border-color:var(--blue);background:#f0f7ff}
.check-item.active{background:var(--navy);border-color:var(--navy)}
.check-item input{display:none}
.check-box{width:14px;height:14px;border-radius:4px;border:1.5px solid var(--gray3);background:var(--white);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;transition:all .15s}
.check-item.active .check-box{background:var(--blue);border-color:var(--blue);color:white}
.check-name{font-size:.72rem;font-weight:500;color:var(--dark);line-height:1.2;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.check-item.active .check-name{color:white}

/* SLIDER */
.slider-wrap{padding:0 2px}
.slider-val{display:flex;justify-content:space-between;font-size:.8rem;color:var(--gray4);margin-bottom:8px}
.slider-val strong{color:var(--blue);font-weight:700;font-size:.9rem}
input[type=range]{width:100%;accent-color:var(--blue);height:5px;cursor:pointer}

/* FILTER ACTIONS */
.filter-actions{display:flex;gap:8px;margin-top:18px;padding-top:14px;border-top:1px solid var(--gray2)}
.btn-apply{flex:1;padding:11px;background:var(--blue);color:white;border:none;border-radius:9px;font-weight:700;font-size:.88rem;cursor:pointer;font-family:'Inter',sans-serif}
.btn-clear{padding:11px 16px;background:var(--gray1);color:var(--gray4);border:1.5px solid var(--gray2);border-radius:9px;font-weight:500;font-size:.88rem;cursor:pointer;font-family:'Inter',sans-serif}
.active-filters-bar{padding:6px 16px;background:#eff6ff;border-bottom:1px solid #bfdbfe;font-size:.75rem;color:var(--blue);display:none;align-items:center;gap:6px;flex-wrap:wrap}
.active-filters-bar.visible{display:flex}
.af-tag{background:var(--blue);color:white;padding:2px 8px;border-radius:10px;font-size:.7rem;font-weight:600}
.af-clear{margin-left:auto;color:var(--blue);font-weight:600;cursor:pointer;font-size:.75rem}

/* STATS */
.stats-bar{padding:8px 16px;font-size:.75rem;color:var(--gray4);background:var(--white);border-bottom:1px solid var(--gray2)}
.stats-bar strong{color:var(--blue)}

/* LIST */
.list{padding:10px 12px 100px;display:flex;flex-direction:column;gap:8px}

/* CARD */
.card{background:var(--white);border-radius:var(--radius);border:1px solid var(--gray2);box-shadow:var(--shadow);overflow:hidden}
.card-header{padding:14px 14px 12px;cursor:pointer;user-select:none}
.card-header:active{background:var(--gray1)}
.card-row1{display:flex;align-items:flex-start;gap:10px;margin-bottom:9px}
.card-icon{width:38px;height:38px;border-radius:9px;background:var(--blue-light);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.card-titles{flex:1;min-width:0}
.card-empresa{font-weight:600;font-size:.9rem;color:var(--navy);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-posicion{font-size:.78rem;color:var(--gray4);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-chevron{color:var(--gray3);font-size:13px;transition:transform .2s;flex-shrink:0;margin-top:3px}
.card.expanded .card-chevron{transform:rotate(180deg)}
.card-tags{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.tag{display:inline-flex;align-items:center;gap:3px;font-size:.71rem;padding:3px 8px;border-radius:20px;font-weight:500}
.tag-state{background:#eff6ff;color:#1d4ed8}
.tag-wage{background:var(--green-light);color:var(--green)}
.tag-date{background:var(--amber-light);color:var(--amber)}
.contact-dots{display:flex;gap:4px;flex-shrink:0}
.dot{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px}
.dot-email{background:#dbeafe}
.dot-phone{background:#d1fae5}
.dot-web{background:#fef3c7}

/* CARD BODY */
.card-body{border-top:1px solid var(--gray2);padding:14px;display:none;animation:fadeIn .2s ease}
.card.expanded .card-body{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.detail-row{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid var(--gray2)}
.detail-row:last-of-type{border-bottom:none}
.detail-icon{width:30px;height:30px;border-radius:8px;background:var(--gray1);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.detail-label{font-size:.68rem;color:var(--gray3);font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.detail-value{font-size:.85rem;color:var(--dark);font-weight:500;margin-top:1px;word-break:break-word}
.detail-actions{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
.btn-action{display:inline-flex;align-items:center;gap:6px;padding:10px 16px;border-radius:9px;font-size:.83rem;font-weight:600;cursor:pointer;border:none;font-family:'Inter',sans-serif;text-decoration:none;transition:opacity .15s}
.btn-action:active{opacity:.8}
.btn-email{background:var(--blue);color:white}
.btn-web{background:var(--navy);color:white}
.btn-copy{background:var(--gray1);color:var(--gray4);border:1px solid var(--gray2)}
.desc-text{font-size:.8rem;color:var(--gray4);line-height:1.55;margin-top:4px}
.desc-toggle{font-size:.75rem;color:var(--blue);cursor:pointer;font-weight:600;margin-top:4px;display:inline-block}

/* PAGINATION */
.pagination{display:flex;align-items:center;justify-content:center;gap:10px;padding:14px 16px;background:var(--white);border-top:1px solid var(--gray2);position:fixed;bottom:0;left:0;right:0;box-shadow:0 -2px 12px rgba(0,0,0,.08)}
.btn-page{padding:8px 16px;border-radius:8px;border:1.5px solid var(--gray2);background:var(--white);font-size:.82rem;font-weight:600;cursor:pointer;color:var(--dark);font-family:'Inter',sans-serif}
.btn-page:disabled{opacity:.35;cursor:default}
.page-info{font-size:.8rem;color:var(--gray4);font-weight:500}

/* MISC */
.center-msg{text-align:center;padding:60px 20px;color:var(--gray3)}
.center-msg .big{font-size:2.2rem;margin-bottom:10px}
.center-msg p{font-size:.9rem;line-height:1.5}
.spinner{width:32px;height:32px;border:3px solid var(--gray2);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
.today-empty{background:var(--amber-light);border:1px solid #fcd34d;border-radius:var(--radius);padding:16px;margin:12px;color:var(--amber);font-size:.85rem;line-height:1.6;text-align:center}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--dark);color:white;padding:8px 18px;border-radius:20px;font-size:.8rem;font-weight:500;opacity:0;transition:all .25s;pointer-events:none;z-index:300}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="header-top">
      <div class="logo-mark">💼</div>
      <div>
        <div class="app-title">Trabajos H2B</div>
        <div class="app-sub">Empleos no agrícolas · EE.UU.</div>
      </div>
    </div>
    <div class="search-row">
      <div class="search-wrap">
        <span class="si">🔍</span>
        <input type="search" id="searchInput" placeholder="Buscar empresa o posición...">
      </div>
      <button class="btn-avanzada" id="btnAvanzada" onclick="toggleFilter()">⚙️ Búsqueda avanzada</button>
    </div>
    <div class="tabs">
      <button class="tab active" id="tabHoy" onclick="cambiarTab('hoy')">
        Hoy <span class="tab-count" id="countHoy">…</span>
      </button>
      <button class="tab" id="tabAnt" onclick="cambiarTab('anteriores')">
        Anteriores <span class="tab-count empty" id="countAnt">…</span>
      </button>
    </div>
  </div>
</header>

<!-- FILTER PANEL -->
<div class="filter-panel" id="filterPanel">
  <div class="filter-inner">
    <div class="filter-section">
      <div class="filter-label">📍 Estado <span id="countEstados"></span></div>
      <div class="check-grid" id="gridEstados"></div>
    </div>
    <div class="filter-section">
      <div class="filter-label">💼 Tipo de trabajo <span id="countTipos"></span></div>
      <div class="check-grid" id="gridTipos"></div>
    </div>
    <div class="filter-section">
      <div class="filter-label">💵 Salario mínimo por hora</div>
      <div class="slider-wrap">
        <div class="slider-val"><span>$0/hr</span><strong id="sliderVal">$0/hr</strong><span>$50/hr</span></div>
        <input type="range" id="salarioSlider" min="0" max="50" value="0" step="1">
      </div>
    </div>
    <div class="filter-actions">
      <button class="btn-clear" onclick="limpiarFiltros()">Limpiar todo</button>
      <button class="btn-apply" onclick="aplicarFiltros()">Ver resultados</button>
    </div>
  </div>
</div>

<!-- ACTIVE FILTERS BAR -->
<div class="active-filters-bar" id="activeFiltersBar">
  <span>Filtros:</span>
  <span id="afTags"></span>
  <span class="af-clear" onclick="limpiarFiltros()">✕ Limpiar</span>
</div>

<div class="stats-bar" id="statsBar">Cargando trabajos...</div>

<div class="list" id="listaTrabajos">
  <div class="center-msg"><div class="spinner"></div><p>Cargando trabajos del DOL...</p></div>
</div>

<div class="pagination" id="pagination" style="display:none">
  <button class="btn-page" id="btnPrev" onclick="cambiarPagina(-1)">← Anterior</button>
  <span class="page-info" id="pageInfo"></span>
  <button class="btn-page" id="btnNext" onclick="cambiarPagina(1)">Siguiente →</button>
</div>

<div class="toast" id="toast">✅ Email copiado</div>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ9Fnx0TZ_xO5Spt__ysZBmxb3HUIJSaC-pLm0ZbaevdkyESsnlVOUYNwSkzO4Rj4vyIYNVawFfk0ZN/pub?gid=1165441440&single=true&output=csv";
const PER_PAGE = 30;

const ESTADOS = {
  AL:"Alabama",AK:"Alaska",AZ:"Arizona",AR:"Arkansas",CA:"California",
  CO:"Colorado",CT:"Connecticut",DE:"Delaware",FL:"Florida",GA:"Georgia",
  HI:"Hawaii",ID:"Idaho",IL:"Illinois",IN:"Indiana",IA:"Iowa",KS:"Kansas",
  KY:"Kentucky",LA:"Louisiana",ME:"Maine",MD:"Maryland",MA:"Massachusetts",
  MI:"Michigan",MN:"Minnesota",MS:"Mississippi",MO:"Missouri",MT:"Montana",
  NE:"Nebraska",NV:"Nevada",NH:"New Hampshire",NJ:"New Jersey",NM:"New Mexico",
  NY:"New York",NC:"North Carolina",ND:"North Dakota",OH:"Ohio",OK:"Oklahoma",
  OR:"Oregon",PA:"Pennsylvania",RI:"Rhode Island",SC:"South Carolina",
  SD:"South Dakota",TN:"Tennessee",TX:"Texas",UT:"Utah",VT:"Vermont",
  VA:"Virginia",WA:"Washington",WV:"West Virginia",WI:"Wisconsin",WY:"Wyoming"
};

const ICONOS = {
  "food":"🍔","cook":"👨‍🍳","kitchen":"🍳","house":"🏠","clean":"🧹","maid":"🧹",
  "land":"🌿","garden":"🌱","forest":"🌲","tree":"🌳","fish":"🐟","seafood":"🐠",
  "crab":"🦀","shrimp":"🦐","horse":"🐴","carnival":"🎡","amusement":"🎠",
  "resort":"🏖️","hotel":"🏨","ski":"⛷️","golf":"⛳","sugar":"🌾",
  "harvest":"🌾","camp":"⛺","recreation":"🏕️","default":"💼"
};

function getIcono(pos){
  const p=pos.toLowerCase();
  for(const[k,v] of Object.entries(ICONOS)) if(p.includes(k)) return v;
  return ICONOS.default;
}

const hoyStr = new Date().toISOString().slice(0,10);

let todos=[], filtrados=[], tabActiva="hoy";
let paginaActual=1, totalPaginas=1;
let filtrosEstado=new Set(), filtrosTipo=new Set(), filtroSalario=0;
let expandedId=null;

// CSV PARSER
function parseCSV(text){
  const lines=text.trim().split("\n");
  const headers=lines[0].split(",").map(h=>h.replace(/"/g,"").trim());
  return lines.slice(1).map(line=>{
    const vals=[]; let cur="",inQ=false;
    for(const ch of line){
      if(ch==='"'){inQ=!inQ;}
      else if(ch===','&&!inQ){vals.push(cur.trim());cur="";}
      else{cur+=ch;}
    }
    vals.push(cur.trim());
    const obj={};
    headers.forEach((h,i)=>obj[h]=(vals[i]||"").replace(/^"|"$/g,""));
    return obj;
  }).filter(r=>r["Empresa"]&&r["Empresa"].length>0);
}

async function cargarDatos(){
  try{
    const res=await fetch(CSV_URL+"&t="+Date.now());
    const text=await res.text();
    todos=parseCSV(text);
    construirFiltros();
    aplicarFiltros();
  }catch(e){
    document.getElementById("listaTrabajos").innerHTML=`<div class="center-msg"><div class="big">⚠️</div><p>No se pudieron cargar los trabajos.<br>Verifica tu conexión.</p></div>`;
  }
}

// BUILD FILTER CHECKBOXES
function construirFiltros(){
  const estados=[...new Set(todos.map(j=>j["Estado"]).filter(Boolean))].sort();
  document.getElementById("gridEstados").innerHTML=estados.map(e=>`
    <div class="check-item" id="ce-${e}" onclick="toggleCheck('estado','${e}')">
      <div class="check-box" id="cb-e-${e}"></div>
      <span class="check-name">${ESTADOS[e]||e}</span>
    </div>`).join("");

  const tipos=[...new Set(todos.map(j=>{
    const words=j["Posición"].trim().split(/\s+/);
    return words.slice(0,2).join(" ");
  }).filter(Boolean))].sort().slice(0,30);
  document.getElementById("gridTipos").innerHTML=tipos.map(t=>`
    <div class="check-item" id="ct-${t.replace(/\s+/g,'-')}" onclick="toggleCheck('tipo','${t}')">
      <div class="check-box" id="cb-t-${t.replace(/\s+/g,'-')}"></div>
      <span class="check-name">${t}</span>
    </div>`).join("");
}

function toggleCheck(tipo, val){
  const set=tipo==='estado'?filtrosEstado:filtrosTipo;
  const prefix=tipo==='estado'?'ce-':'ct-';
  const cbPrefix=tipo==='estado'?'cb-e-':'cb-t-';
  const key=val.replace(/\s+/g,'-');

  if(set.has(val)){
    set.delete(val);
    document.getElementById(prefix+key)?.classList.remove('active');
    document.getElementById(cbPrefix+key).textContent='';
  } else {
    set.add(val);
    document.getElementById(prefix+key)?.classList.add('active');
    document.getElementById(cbPrefix+key).textContent='✓';
  }
  // Update count badge
  if(tipo==='estado') document.getElementById("countEstados").textContent=filtrosEstado.size>0?filtrosEstado.size+" sel.":"";
  else document.getElementById("countTipos").textContent=filtrosTipo.size>0?filtrosTipo.size+" sel.":"";
}

function limpiarFiltros(){
  filtrosEstado.clear(); filtrosTipo.clear(); filtroSalario=0;
  document.querySelectorAll(".check-item").forEach(c=>c.classList.remove("active"));
  document.querySelectorAll(".check-box").forEach(c=>c.textContent="");
  document.getElementById("salarioSlider").value=0;
  document.getElementById("sliderVal").textContent="$0/hr";
  document.getElementById("countEstados").textContent="";
  document.getElementById("countTipos").textContent="";
  aplicarFiltros();
  if(document.getElementById("filterPanel").classList.contains("open")) toggleFilter();
}

function toggleFilter(){
  const panel=document.getElementById("filterPanel");
  const btn=document.getElementById("btnAvanzada");
  panel.classList.toggle("open");
  btn.classList.toggle("active");
}

// SHOW/HIDE advanced button when typing
document.addEventListener("DOMContentLoaded",()=>{
  document.getElementById("searchInput").addEventListener("input",function(){
    const btn=document.getElementById("btnAvanzada");
    if(this.value.length>0) btn.classList.add("visible");
    else btn.classList.remove("visible");
    aplicarFiltros();
  });
  document.getElementById("salarioSlider").addEventListener("input",function(){
    filtroSalario=+this.value;
    document.getElementById("sliderVal").textContent="$"+this.value+"/hr";
  });
});

function updateActiveFiltersBar(){
  const tags=[];
  filtrosEstado.forEach(e=>tags.push(ESTADOS[e]||e));
  filtrosTipo.forEach(t=>tags.push(t));
  if(filtroSalario>0) tags.push("Mín. $"+filtroSalario+"/hr");
  const bar=document.getElementById("activeFiltersBar");
  const tagsEl=document.getElementById("afTags");
  if(tags.length>0){
    tagsEl.innerHTML=tags.map(t=>`<span class="af-tag">${t}</span>`).join("");
    bar.classList.add("visible");
  } else {
    bar.classList.remove("visible");
  }
}

function aplicarFiltros(){
  const q=document.getElementById("searchInput").value.toLowerCase();
  const hoyFiltrados=[], antFiltrados=[];

  todos.forEach(j=>{
    const matchEstado=filtrosEstado.size===0||filtrosEstado.has(j["Estado"]);
    const matchTipo=filtrosTipo.size===0||[...filtrosTipo].some(t=>j["Posición"].includes(t));
    const salNum=parseFloat((j["Salario Desde"]||"").replace(/[^0-9.]/g,""))||0;
    const matchSalario=salNum>=filtroSalario;
    const matchQ=!q||j["Empresa"].toLowerCase().includes(q)||j["Posición"].toLowerCase().includes(q);
    if(!matchEstado||!matchTipo||!matchSalario||!matchQ) return;

    const ultima=j["Última Actualización"]||"";
    if(ultima.startsWith(hoyStr)) hoyFiltrados.push(j);
    else antFiltrados.push(j);
  });

  document.getElementById("countHoy").textContent=hoyFiltrados.length;
  document.getElementById("countAnt").textContent=antFiltrados.length;
  document.getElementById("countHoy").className="tab-count"+(hoyFiltrados.length===0?" empty":"");

  filtrados=tabActiva==="hoy"?hoyFiltrados:antFiltrados;
  paginaActual=1;
  totalPaginas=Math.ceil(filtrados.length/PER_PAGE)||1;
  updateActiveFiltersBar();
  renderLista();
  if(document.getElementById("filterPanel").classList.contains("open")) toggleFilter();
}

function cambiarTab(tab){
  tabActiva=tab;
  document.getElementById("tabHoy").classList.toggle("active",tab==="hoy");
  document.getElementById("tabAnt").classList.toggle("active",tab==="anteriores");
  aplicarFiltros();
}

function renderLista(){
  const lista=document.getElementById("listaTrabajos");
  const stats=document.getElementById("statsBar");
  const pag=document.getElementById("pagination");

  if(tabActiva==="hoy"&&filtrados.length===0){
    lista.innerHTML=`<div class="today-empty">📭 No hay nuevas publicaciones hoy.<br>Revisa las publicaciones anteriores.</div>`;
    pag.style.display="none";
    stats.innerHTML="Sin publicaciones nuevas hoy";
    return;
  }
  if(filtrados.length===0){
    lista.innerHTML=`<div class="center-msg"><div class="big">🔍</div><p>No se encontraron trabajos<br>con esos criterios.</p></div>`;
    pag.style.display="none";
    stats.innerHTML="Sin resultados";
    return;
  }

  const inicio=(paginaActual-1)*PER_PAGE;
  const pagina=filtrados.slice(inicio,inicio+PER_PAGE);
  stats.innerHTML=`Mostrando <strong>${inicio+1}–${Math.min(inicio+PER_PAGE,filtrados.length)}</strong> de <strong>${filtrados.length}</strong> trabajos`;

  lista.innerHTML=pagina.map((j,i)=>{
    const idx=inicio+i;
    const icono=getIcono(j["Posición"]);
    const estado=ESTADOS[j["Estado"]]||j["Estado"]||"";
    const salDesde=j["Salario Desde"]||"";
    const salHasta=j["Salario Hasta"]||"";
    const sal=salDesde&&salHasta?`${salDesde} – ${salHasta}`:salDesde||salHasta;
    const hasEmail=!!j["Email"];
    const hasPhone=!!j["Teléfono"];
    const hasWeb=!!(j["Sitio Web"]||j["URL Aplicación"]);
    const isExp=expandedId===idx;
    const desc=j["Descripción ES"]||j["Descripción"]||"";
    const descCorta=desc.length>180?desc.slice(0,180)+"…":desc;

    return `
    <div class="card${isExp?" expanded":""}" id="card-${idx}">
      <div class="card-header" onclick="toggleCard(${idx})">
        <div class="card-row1">
          <div class="card-icon">${icono}</div>
          <div class="card-titles">
            <div class="card-empresa">${j["Empresa"]}</div>
            <div class="card-posicion">${j["Posición"]}</div>
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
            <div class="contact-dots">
              ${hasEmail?'<div class="dot dot-email">📧</div>':""}
              ${hasPhone?'<div class="dot dot-phone">📞</div>':""}
              ${hasWeb?'<div class="dot dot-web">🌐</div>':""}
            </div>
            <div class="card-chevron">▼</div>
          </div>
        </div>
        <div class="card-tags">
          ${estado?`<span class="tag tag-state">📍 ${j["Ciudad"]?j["Ciudad"]+", ":""}${estado}</span>`:""}
          ${sal?`<span class="tag tag-wage">💵 ${sal}</span>`:""}
          ${j["Fecha Inicio"]?`<span class="tag tag-date">📅 ${j["Fecha Inicio"]}</span>`:""}
        </div>
      </div>
      <div class="card-body">
        ${j["Fecha Fin"]?`<div class="detail-row"><div class="detail-icon">📅</div><div><div class="detail-label">Período</div><div class="detail-value">${j["Fecha Inicio"]} → ${j["Fecha Fin"]}</div></div></div>`:""}
        ${hasPhone?`<div class="detail-row"><div class="detail-icon">📞</div><div><div class="detail-label">Teléfono</div><div class="detail-value">${j["Teléfono"]}</div></div></div>`:""}
        ${hasEmail?`<div class="detail-row"><div class="detail-icon">✉️</div><div><div class="detail-label">Email</div><div class="detail-value">${j["Email"]}</div></div></div>`:""}
        ${desc?`<div class="detail-row"><div class="detail-icon">📋</div><div><div class="detail-label">Descripción</div><div class="desc-text" id="desc-${idx}">${descCorta}</div>${desc.length>180?`<span class="desc-toggle" onclick="toggleDesc(${idx},\`${desc.replace(/`/g,"'")}\`,\`${descCorta.replace(/`/g,"'")}\`)">Ver más</span>`:""}</div></div>`:""}
        <div class="detail-actions">
          ${hasEmail?`<a class="btn-action btn-email" href="mailto:${j["Email"]}?subject=Application for ${encodeURIComponent(j["Posición"])}">✉️ Aplicar por email</a>`:""}
          ${hasEmail?`<button class="btn-action btn-copy" onclick="copiarEmail('${j["Email"]}')">📋 Copiar email</button>`:""}
          ${hasWeb?`<a class="btn-action btn-web" href="${j["URL Aplicación"]||j["Sitio Web"]}" target="_blank">🌐 Aplicar en línea</a>`:""}
        </div>
      </div>
    </div>`;
  }).join("");

  if(totalPaginas>1){
    pag.style.display="flex";
    document.getElementById("pageInfo").textContent=`Página ${paginaActual} de ${totalPaginas}`;
    document.getElementById("btnPrev").disabled=paginaActual===1;
    document.getElementById("btnNext").disabled=paginaActual===totalPaginas;
  } else {
    pag.style.display="none";
  }
}

function toggleCard(idx){
  expandedId=expandedId===idx?null:idx;
  renderLista();
  if(expandedId!==null){
    setTimeout(()=>document.getElementById("card-"+idx)?.scrollIntoView({behavior:"smooth",block:"nearest"}),100);
  }
}

function toggleDesc(idx,full,short){
  const el=document.getElementById("desc-"+idx);
  const toggle=el.nextElementSibling;
  if(toggle.textContent==="Ver más"){el.textContent=full;toggle.textContent="Ver menos";}
  else{el.textContent=short;toggle.textContent="Ver más";}
}

function cambiarPagina(dir){
  paginaActual=Math.max(1,Math.min(totalPaginas,paginaActual+dir));
  expandedId=null;
  renderLista();
  window.scrollTo({top:0,behavior:"smooth"});
}

function copiarEmail(email){
  navigator.clipboard.writeText(email).then(()=>{
    const t=document.getElementById("toast");
    t.classList.add("show");
    setTimeout(()=>t.classList.remove("show"),2000);
  });
}

cargarDatos();
</script>
</body>
</html>
